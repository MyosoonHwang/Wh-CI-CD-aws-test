version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: "ap-northeast-3"
    REPOSITORY_URI: "354493396671.dkr.ecr.ap-northeast-3.amazonaws.com/wh-repository"

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI

  build:
    commands:
      - echo Build started on `date`
      - docker build -t app .
      - docker tag app:latest $REPOSITORY_URI:latest

  post_build:
    commands:
      - echo Build completed on `date`
      - docker push $REPOSITORY_URI:latest
      - printf '[{"name":"app-container","imageUri":"%s"}]' $REPOSITORY_URI:latest > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json